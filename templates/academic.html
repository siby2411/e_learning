<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Suivi Académique - E-Learning</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .academic-dashboard {
            padding: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #dee2e6;
        }
        .stat-card h3 { color: #1a237e; font-size: 24px; margin: 0; }
        .stat-card p { color: #666; font-size: 13px; margin: 4px 0 0; }
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { background: #f5f5f5; font-weight: 600; color: #333; }
        tr:hover { background: #f8f9fa; }
        .badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-pass { background: #c8e6c9; color: #1b5e20; }
        .badge-fail { background: #ffcdd2; color: #b71c1c; }
        .badge-pending { background: #fff3e0; color: #e65100; }
        .badge-paid { background: #c8e6c9; color: #1b5e20; }
        .badge-overdue { background: #ffcdd2; color: #b71c1c; }
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .filters select, .filters input {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .btn-sm {
            padding: 4px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-primary-sm { background: #1a237e; color: #fff; }
        .btn-success-sm { background: #2e7d32; color: #fff; }
        .btn-danger-sm { background: #c62828; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Suivi Académique</h1>
            <p>Gestion des inscriptions, notes et paiements</p>
            <div class="header-actions">
                <a href="/" style="color:#fff;">← Retour</a>
            </div>
        </header>

        <nav>
            <a href="#" onclick="showTab('dashboard')">📊 Dashboard</a>
            <a href="#" onclick="showTab('enrollments')">📋 Inscriptions</a>
            <a href="#" onclick="showTab('grades')">📝 Notes</a>
            <a href="#" onclick="showTab('payments')">💰 Paiements</a>
            <a href="#" onclick="showTab('results')">🏆 Résultats</a>
        </nav>

        <main>
            <!-- Dashboard -->
            <section id="tab-dashboard" class="tab active">
                <div class="academic-dashboard">
                    <div class="stats-grid" id="dashboard-stats"></div>
                    <h3>📈 État financier</h3>
                    <div id="financial-summary"></div>
                </div>
            </section>

            <!-- Inscriptions -->
            <section id="tab-enrollments" class="tab" style="display:none;">
                <h2>Liste des inscrits</h2>
                <div class="filters">
                    <select id="filter-status" onchange="loadEnrollments()">
                        <option value="">Tous</option>
                        <option value="active">Actifs</option>
                        <option value="pending">En attente</option>
                        <option value="completed">Terminés</option>
                    </select>
                    <select id="filter-course" onchange="loadEnrollments()">
                        <option value="">Tous les cours</option>
                    </select>
                    <input type="text" id="filter-search" placeholder="Rechercher..." oninput="loadEnrollments()">
                </div>
                <div id="enrollments-list"></div>
            </section>

            <!-- Notes -->
            <section id="tab-grades" class="tab" style="display:none;">
                <h2>Relevé de notes</h2>
                <div id="grades-view">
                    <div class="filters">
                        <select id="grade-course" onchange="loadGrades()">
                            <option value="">Choisir un cours</option>
                        </select>
                        <select id="grade-student" onchange="loadGrades()">
                            <option value="">Choisir un étudiant</option>
                        </select>
                    </div>
                    <div id="transcript-view"></div>
                </div>
            </section>

            <!-- Paiements -->
            <section id="tab-payments" class="tab" style="display:none;">
                <h2>Suivi des paiements</h2>
                <div id="payments-view"></div>
            </section>

            <!-- Résultats -->
            <section id="tab-results" class="tab" style="display:none;">
                <h2>Résultats définitifs</h2>
                <div id="results-view"></div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 E-Learning Sénégal - Suivi Académique</p>
        </footer>
    </div>

    <script>
        const API_BASE = '/api/academic';

        // ===== NAVIGATION =====
        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
            document.getElementById(`tab-${tabName}`).style.display = 'block';
            
            if (tabName === 'dashboard') loadDashboard();
            if (tabName === 'enrollments') loadEnrollments();
            if (tabName === 'grades') loadCoursesForGrades();
            if (tabName === 'payments') loadPayments();
            if (tabName === 'results') loadResults();
        }

        // ===== DASHBOARD =====
        async function loadDashboard() {
            try {
                const resp = await fetch(`${API_BASE}/financial`);
                const data = await resp.json();
                
                const stats = document.getElementById('dashboard-stats');
                if (data.revenue) {
                    stats.innerHTML = `
                        <div class="stat-card"><h3>${data.revenue.total_transactions || 0}</h3><p>💰 Transactions</p></div>
                        <div class="stat-card"><h3>${(data.revenue.total_revenue || 0).toLocaleString()} FCFA</h3><p>📊 Revenus totaux</p></div>
                        <div class="stat-card"><h3>${(data.revenue.average_payment || 0).toLocaleString()} FCFA</h3><p>📈 Paiement moyen</p></div>
                        <div class="stat-card"><h3>${data.outstanding ? data.outstanding.length : 0}</h3><p>⏳ Impayés</p></div>
                    `;
                }

                // Revenus par cours
                let html = '<table><thead><tr><th>Cours</th><th>Inscriptions</th><th>Revenus</th></tr></thead><tbody>';
                if (data.by_course) {
                    data.by_course.forEach(c => {
                        html += `<tr><td>${c.course_title}</td><td>${c.enrollments}</td><td>${(c.revenue || 0).toLocaleString()} FCFA</td></tr>`;
                    });
                }
                html += '</tbody></table>';
                document.getElementById('financial-summary').innerHTML = html;
            } catch (err) {
                console.error(err);
            }
        }

        // ===== INSCRIPTIONS =====
        async function loadEnrollments() {
            const status = document.getElementById('filter-status').value;
            const course = document.getElementById('filter-course').value;
            const search = document.getElementById('filter-search').value;
            
            let url = `${API_BASE}/enrollments?`;
            if (status) url += `status=${status}&`;
            if (course) url += `course_id=${course}&`;
            if (search) url += `search=${search}&`;

            try {
                const resp = await fetch(url);
                const data = await resp.json();
                
                let html = `<div class="table-container"><table>
                    <thead><tr>
                        <th>Étudiant</th><th>Email</th><th>Cours</th>
                        <th>Statut</th><th>Paiement</th><th>Progression</th>
                        <th>Moyenne</th><th>Actions</th>
                    </tr></thead><tbody>`;
                
                data.forEach(e => {
                    const statusClass = e.status === 'active' ? 'badge-pass' : 
                                       e.status === 'completed' ? 'badge-paid' : 'badge-pending';
                    const paymentClass = e.payment_status === 'paid' ? 'badge-paid' : 'badge-pending';
                    html += `<tr>
                        <td>${e.first_name} ${e.last_name}</td>
                        <td>${e.email}</td>
                        <td>${e.course_title}</td>
                        <td><span class="badge ${statusClass}">${e.status}</span></td>
                        <td><span class="badge ${paymentClass}">${e.payment_status}</span></td>
                        <td>${e.progress_percentage || 0}%</td>
                        <td><strong>${e.average_score || '-'}/20</strong></td>
                        <td>
                            <button class="btn-sm btn-primary-sm" onclick="viewTranscript(${e.enrollment_id})">📝 Notes</button>
                        </td>
                    </tr>`;
                });
                
                html += '</tbody></table></div>';
                document.getElementById('enrollments-list').innerHTML = html || '<p>Aucune inscription.</p>';
                
                // Charger les cours pour le filtre
                loadCoursesForFilter();
            } catch (err) {
                console.error(err);
            }
        }

        async function loadCoursesForFilter() {
            try {
                const resp = await fetch('/api/courses');
                const data = await resp.json();
                const select = document.getElementById('filter-course');
                select.innerHTML = '<option value="">Tous les cours</option>';
                data.forEach(c => {
                    select.innerHTML += `<option value="${c.id}">${c.title}</option>`;
                });
            } catch (err) {}
        }

        // ===== NOTES =====
        async function loadCoursesForGrades() {
            try {
                const resp = await fetch('/api/courses');
                const data = await resp.json();
                const select = document.getElementById('grade-course');
                select.innerHTML = '<option value="">Choisir un cours</option>';
                data.forEach(c => {
                    select.innerHTML += `<option value="${c.id}">${c.title}</option>`;
                });
            } catch (err) {}
        }

        async function loadGrades() {
            const courseId = document.getElementById('grade-course').value;
            if (!courseId) {
                document.getElementById('transcript-view').innerHTML = '<p>Sélectionnez un cours.</p>';
                return;
            }
            
            try {
                const resp = await fetch(`/api/academic/exams/course/${courseId}`);
                const exams = await resp.json();
                
                const studentsResp = await fetch(`/api/academic/enrollments?course_id=${courseId}`);
                const students = await studentsResp.json();
                
                const select = document.getElementById('grade-student');
                select.innerHTML = '<option value="">Choisir un étudiant</option>';
                students.forEach(s => {
                    select.innerHTML += `<option value="${s.enrollment_id}">${s.first_name} ${s.last_name}</option>`;
                });
            } catch (err) {}
        }

        async function viewTranscript(enrollmentId) {
            try {
                const resp = await fetch(`/api/academic/transcript/${enrollmentId}`);
                const data = await resp.json();
                
                if (data.error) {
                    alert(data.error);
                    return;
                }
                
                let html = `
                    <h3>${data.student.first_name} ${data.student.last_name}</h3>
                    <p><strong>Cours:</strong> ${data.student.course_title}</p>
                    <p><strong>Statut:</strong> ${data.student.status}</p>
                    <div class="stats-grid" style="margin:16px 0;">
                        <div class="stat-card"><h3>${data.statistics.total_exams || 0}</h3><p>Examens</p></div>
                        <div class="stat-card"><h3>${data.statistics.passed || 0}</h3><p>Réussis</p></div>
                        <div class="stat-card"><h3>${data.statistics.average || '-'}/20</h3><p>Moyenne</p></div>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead><tr><th>Examen</th><th>Type</th><th>Coeff.</th><th>Note</th><th>Statut</th></tr></thead>
                            <tbody>
                `;
                
                data.grades.forEach(g => {
                    const passed = g.is_passed ? '<span class="badge badge-pass">✅ Réussi</span>' : 
                                                  '<span class="badge badge-fail">❌ Échec</span>';
                    html += `<tr>
                        <td>${g.exam_title}</td>
                        <td>${g.exam_type}</td>
                        <td>${g.coefficient}</td>
                        <td><strong>${g.score || '-'}/20</strong></td>
                        <td>${passed}</td>
                    </tr>`;
                });
                
                html += '</tbody></table></div>';
                document.getElementById('transcript-view').innerHTML = html;
            } catch (err) {
                alert('Erreur chargement du relevé');
            }
        }

        // ===== PAIEMENTS =====
        async function loadPayments() {
            try {
                const resp = await fetch(`/api/academic/financial`);
                const data = await resp.json();
                
                let html = `
                    <div class="stats-grid">
                        <div class="stat-card"><h3>${(data.revenue.total_revenue || 0).toLocaleString()} FCFA</h3><p>💰 Revenus totaux</p></div>
                        <div class="stat-card"><h3>${data.revenue.total_transactions || 0}</h3><p>📊 Transactions</p></div>
                        <div class="stat-card"><h3>${data.outstanding ? data.outstanding.length : 0}</h3><p>⏳ Impayés</p></div>
                    </div>
                    <h3>⏳ Impayés</h3>
                    <div class="table-container">
                        <table>
                            <thead><tr><th>Étudiant</th><th>Cours</th><th>Total</th><th>Payé</th><th>Reste</th></tr></thead>
                            <tbody>
                `;
                
                if (data.outstanding) {
                    data.outstanding.forEach(o => {
                        html += `<tr>
                            <td>${o.first_name} ${o.last_name}</td>
                            <td>${o.course_title}</td>
                            <td>${(o.total_fees || 0).toLocaleString()} FCFA</td>
                            <td>${(o.paid || 0).toLocaleString()} FCFA</td>
                            <td><strong style="color:#c62828;">${(o.balance || 0).toLocaleString()} FCFA</strong></td>
                        </tr>`;
                    });
                }
                
                html += '</tbody></table></div>';
                document.getElementById('payments-view').innerHTML = html;
            } catch (err) {}
        }

        // ===== RÉSULTATS =====
        async function loadResults() {
            try {
                const resp = await fetch(`/api/academic/results`);
                const data = await resp.json();
                
                let html = `
                    <div class="table-container">
                        <table>
                            <thead><tr>
                                <th>Étudiant</th><th>Cours</th>
                                <th>Note finale</th><th>Résultat</th>
                                <th>Paiement</th><th>Examens</th>
                            </tr></thead>
                            <tbody>
                `;
                
                data.forEach(r => {
                    const resultClass = r.final_result === 'validé' ? 'badge-pass' : 
                                       r.final_result === 'échec' ? 'badge-fail' : 'badge-pending';
                    const paymentClass = r.payment_status === 'payé' ? 'badge-paid' : 'badge-pending';
                    html += `<tr>
                        <td>${r.first_name} ${r.last_name}</td>
                        <td>${r.course_title}</td>
                        <td><strong>${r.final_grade || '-'}/20</strong></td>
                        <td><span class="badge ${resultClass}">${r.final_result || 'en cours'}</span></td>
                        <td><span class="badge ${paymentClass}">${r.payment_status || 'non payé'}</span></td>
                        <td>${r.passed_exams || 0}/${r.total_exams || 0}</td>
                    </tr>`;
                });
                
                html += '</tbody></table></div>';
                document.getElementById('results-view').innerHTML = html;
            } catch (err) {}
        }

        // Chargement initial
        document.addEventListener('DOMContentLoaded', () => {
            loadDashboard();
            loadCoursesForFilter();
        });
    </script>
</body>
</html>
